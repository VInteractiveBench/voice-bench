speech_notes:
- Use common south Vietnamese wording at slow speed.
- Keep transcript readable standard Vietnamese while metadata captures accent-specific pronunciation expectations.
- Use natural in-car commands for navigation, cabin control, media, phone, confirmation, barge-in and repair turns.
- For text-to-voice, preserve intelligibility and regional prosody without exaggerating stereotypes.
constraints:
- Không gán toàn bộ miền Nam với một kiểu miền Tây hoặc Sài Gòn cụ thể.
- Không thay chính tả chuẩn bằng phiên âm như “dzậy”, “gòi” tràn lan trừ khi có test robustness riêng.
- Không để mức thân mật làm mơ hồ lệnh an toàn trong xe.
benchmark_modes:
- full_duplex_voice_eval
- text_to_voice_eval
