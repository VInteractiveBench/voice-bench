speech_realization:
  phonology_notes:
  - Giọng Nam thường mềm, thoải mái, thân mật; nhịp nói tự nhiên, ít nhấn gắt từng âm.
  - Âm v có thể nghe gần d/gi trong lời nói tự nhiên, ví dụ “về/vàng/vịt”; transcript vẫn viết chính tả chuẩn.
  - Một số âm cuối như -t, -c, -n có thể bật nhẹ hơn hoặc ít sắc hơn giọng Bắc; cần test nhận dạng slot ngắn.
  - Dấu hỏi/ngã có thể ít tách biệt hơn Bắc; TTS/ASR cần giữ intelligibility nhưng không làm quá thành lỗi chính
    tả.
  - Từ thân mật như tui, hông, nè, nha, dòm, xíu dùng vừa phải; ưu tiên intent rõ trong môi trường lái xe.
  pause_pattern: Ngắt nghỉ rõ 600-900 ms, nhất là trước địa chỉ, số điện thoại, mức nhiệt hoặc xác nhận.
  disfluency_rate: low
  disfluency_notes:
  - Ít filler; người nói có xu hướng tách rõ intent và tham số.
  - Có thể lặp lại slot quan trọng một lần nếu lệnh dài hoặc dễ nhầm.
  - Phù hợp test TTS clarity, confirmation turn và repair ở nhịp chậm.
  prosody:
  - Wake word tách nhẹ khỏi lệnh chính để mô phỏng tương tác thật trong xe.
  - 'Nhấn vào slot quan trọng: địa điểm, hướng rẽ, mức nhiệt, tên liên hệ, tên bài hát.'
  - Audio benchmark có thể thêm tiếng ồn cabin ở tầng dữ liệu; persona text không tự thêm ký hiệu nhiễu.
interaction_patterns:
  command_style:
  - 'Câu lệnh có thể thân mật hơn: “Vivi ơi, quẹo phải nha”, “Mở máy lạnh giùm tôi”.'
  - Dùng “quẹo”, “máy lạnh”, “giùm”, “nha”, “hông” như biến thể tự nhiên nhưng không lạm dụng tiếng lóng.
  - Giữ nội dung nhiệm vụ rõ ràng để đánh giá đúng intent, tool call và final state.
  common_repairs:
  - 'Đổi hướng: “rẽ trái, à không rẽ phải”.'
  - 'Đổi tham số: “hai mươi tư độ, không, hai mươi ba độ”.'
  - 'Hủy intent: “thôi bỏ đi”, “khỏi gọi nữa”.'
  - 'Bổ sung ràng buộc: “ưu tiên đường nhanh nhất”, “né đường kẹt”, “đừng đi cao tốc”.'
  safety_relevant_behaviors:
  - Lệnh trong xe thường ngắn; assistant phải hỏi lại khi thiếu slot quan trọng.
  - Không giả định intent nếu người dùng tự sửa lệnh hoặc bị ngắt lời giữa chừng.
  - Với lệnh liên quan lái xe/an toàn, phản hồi phải ngắn, xác nhận đủ và giảm phân tâm.
  - 'Full-duplex cần xử lý barge-in: người dùng có thể chen ngang để hủy, sửa hướng hoặc đổi tham số.'
example_utterances:
- Vivi ơi, dẫn đường tới bệnh viện gần nhất. Chọn tuyến dễ đi nha.
- Giảm âm lượng xuống mức ba. Rồi tắt nhạc.
- 'Nhắn tin cho mẹ: con đang lái xe về nhà.'
negative_examples:
- Không viết câu quá dài như kịch bản tổng đài; người dùng trong xe thường nói ngắn.
- Không dùng phương ngữ cực địa phương khiến intent hoặc slot bị mơ hồ.
- Không thêm thông tin cá nhân không cần thiết vào persona.
- Không đưa lỗi ASR/TTS trực tiếp vào transcript chuẩn.
