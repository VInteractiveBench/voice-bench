speech_realization:
  phonology_notes:
  - Giọng Trung biến thiên nội vùng rất lớn; persona chỉ mô phỏng đặc trưng chung, không dùng từ địa phương nặng
    làm mặc định.
  - Âm sắc có thể trầm/nặng hoặc trầm bổng tùy mẫu giọng; âm tiết thường ngắn, chắc và dứt khoát hơn Bắc/Nam.
  - Một số vùng không tách rõ dấu hỏi/dấu ngã; ASR cần kiểm tra khả năng nhận đúng thanh điệu và slot dưới biến
    thể này.
  - Có thể xuất hiện biến đổi phụ âm đầu như nh/gi/d ở một số vùng; chỉ mô tả ở metadata, không sửa chính tả transcript.
  - Từ địa phương nhẹ như mô, rứa, răng, chi, nỏ có thể xuất hiện ít để test robustness nhưng không làm mơ hồ intent.
  pause_pattern: Ngắt nghỉ tự nhiên 300-600 ms giữa wake word, intent chính và tham số.
  disfluency_rate: low_to_medium
  disfluency_notes:
  - Filler xuất hiện vừa phải ở đầu câu hoặc khi đổi ý.
  - Slot quan trọng như địa điểm, mức nhiệt, tên liên hệ được nói đủ rõ.
  - Dùng làm baseline chính cho so sánh accent-region trong benchmark.
  prosody:
  - Wake word tách nhẹ khỏi lệnh chính để mô phỏng tương tác thật trong xe.
  - 'Nhấn vào slot quan trọng: địa điểm, hướng rẽ, mức nhiệt, tên liên hệ, tên bài hát.'
  - Audio benchmark có thể thêm tiếng ồn cabin ở tầng dữ liệu; persona text không tự thêm ký hiệu nhiễu.
interaction_patterns:
  command_style:
  - 'Câu lệnh nên gọn, dứt khoát: “Vivi ơi, mở nhạc nhẹ”, “Dẫn đường về nhà”.'
  - Cho phép ít từ miền Trung nhẹ như “rứa à”, “để coi”, “nỏ” nhưng không địa phương hóa toàn bộ câu.
  - Ưu tiên dễ hiểu liên vùng vì Vivi phải xử lý người dùng từ nhiều tỉnh miền Trung.
  common_repairs:
  - 'Đổi hướng: “rẽ trái, à không rẽ phải”.'
  - 'Đổi tham số: “hai mươi tư độ, không, hai mươi ba độ”.'
  - 'Hủy intent: “thôi bỏ đi”, “khỏi gọi nữa”.'
  - 'Bổ sung ràng buộc: “ưu tiên đường nhanh nhất”, “né đường kẹt”, “đừng đi cao tốc”.'
  safety_relevant_behaviors:
  - Lệnh trong xe thường ngắn; assistant phải hỏi lại khi thiếu slot quan trọng.
  - Không giả định intent nếu người dùng tự sửa lệnh hoặc bị ngắt lời giữa chừng.
  - Với lệnh liên quan lái xe/an toàn, phản hồi phải ngắn, xác nhận đủ và giảm phân tâm.
  - 'Full-duplex cần xử lý barge-in: người dùng có thể chen ngang để hủy, sửa hướng hoặc đổi tham số.'
example_utterances:
- Vivi ơi, chỉ đường về nhà bằng tuyến ít đông xe nhất.
- Bật điều hòa hai mươi bốn độ và giảm quạt gió một nấc.
- Mở danh sách nhạc yêu thích của tôi, rứa nhé.
negative_examples:
- Không viết câu quá dài như kịch bản tổng đài; người dùng trong xe thường nói ngắn.
- Không dùng phương ngữ cực địa phương khiến intent hoặc slot bị mơ hồ.
- Không thêm thông tin cá nhân không cần thiết vào persona.
- Không đưa lỗi ASR/TTS trực tiếp vào transcript chuẩn.
