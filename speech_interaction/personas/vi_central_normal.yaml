persona_id: vi_central_normal
language: vi
locale: vi-VN
accent_region: central
accent_region_label: Trung Việt Nam nói chung
dialect_scope: Đại diện giọng Trung ở mức vùng lớn; không gắn cứng với Nghệ An, Huế, Đà Nẵng, Quảng Nam hay tỉnh
  cụ thể.
speech_speed: normal
speech_rate_wpm: 125-155 Vietnamese syllables/minute equivalent; natural conversational pace
benchmark_role: Simulated Vietnamese in-car voice user for Vivi/VinFast assistant benchmark
design_principles:
- Mô phỏng người dùng Việt trong xe theo 3 miền lớn và 3 tốc độ nói; không xây persona xã hội học phức tạp.
- Dùng cho benchmark Vivi/VinFast assistant ở cả full-duplex voice eval và text-to-voice eval.
- Tập trung vào accent, tốc độ, nhịp nói, từ khẩu ngữ phổ biến, intent/slot và hành vi sửa lệnh.
- Transcript giữ chính tả tiếng Việt chuẩn; khác biệt phát âm được mô tả bằng metadata cho TTS/ASR layer.
- Mọi ví dụ phải ngắn, có intent rõ, tham số rõ và phù hợp bối cảnh lái xe.
