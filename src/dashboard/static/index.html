<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice·Bench — Forensic Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
